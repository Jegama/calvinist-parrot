name: calvinist-parrot

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: calvinist-parrot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: calvinist_parrot
      POSTGRES_PASSWORD: calvinist_parrot
      POSTGRES_DB: calvinist_parrot_dev
    ports:
      - "54322:5432"
    volumes:
      - calvinist_parrot_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  calvinist_parrot_postgres_data:
