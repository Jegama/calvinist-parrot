name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: calvinist_parrot
          POSTGRES_PASSWORD: calvinist_parrot
          POSTGRES_DB: calvinist_parrot_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calvinist_parrot -d calvinist_parrot_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://calvinist_parrot:calvinist_parrot@localhost:5432/calvinist_parrot_dev?schema=public
      CCEL_URL: postgresql://calvinist_parrot:calvinist_parrot@localhost:5432/calvinist_parrot_dev?schema=public
      ANTHROPIC_API_KEY: ci-placeholder
      GEMINI_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
      TAVILY_API_KEY: ci-placeholder
      CRON_SECRET: ci-placeholder
      ADMIN_ID: ci-admin
      NEXT_PUBLIC_ADMIN_ID: ci-admin
      APPWRITE_ENDPOINT: http://localhost/v1
      APPWRITE_PROJECT_ID: ci-project
      APPWRITE_API_KEY: ci-placeholder
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APPWRITE_ENDPOINT: http://localhost/v1
      NEXT_PUBLIC_APPWRITE_PROJECT_ID: ci-project
      PARROT_AGENT_PROVIDER: gemini
      PARROT_OPENAI_MODEL: gpt-5-mini
      PARROT_GEMINI_MODEL: gemini-3-flash-preview
      NOMINATIM_USER_AGENT: CalvinistParrotCI/1.0 (ci@calvinistparrot.local)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Validate app
        run: npm run ci
