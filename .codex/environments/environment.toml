# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "calvinist-parrot"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"

if command -v nvm >/dev/null 2>&1 && [ -f .nvmrc ]; then
  nvm install
  nvm use
fi

npm ci
[ -f .env ] || cp .env.template .env

docker compose up -d --wait postgres
npm run db:deploy
npm run db:generate
npm run db:seed
'''

[cleanup]
script = '''
cd "$CODEX_WORKTREE_PATH"
rm -rf .next .turbo
'''

[[actions]]
name = "Dev Local"
icon = "tool"
command = "npm run dev:local"

[[actions]]
name = "Check"
icon = "tool"
command = "npm run check"

[[actions]]
name = "Build"
icon = "tool"
command = "npm run build"

[[actions]]
name = "Seed DB"
icon = "tool"
command = "npm run db:seed"
